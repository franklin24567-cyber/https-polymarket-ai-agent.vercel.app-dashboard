<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Polymarket AI Agent</title>
  <link rel="stylesheet" href="../../styles.css" />
  <style>
    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      padding: 36px 32px;
    }

    .login-card .brand {
      justify-content: center;
      margin-bottom: 24px;
    }

    .login-card h2 {
      text-align: center;
      margin: 0 0 6px;
      font-size: 1.4rem;
    }

    .login-card .sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--panel-border);
      background: rgba(255, 255, 255, 0.04);
      color: white;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--primary-2);
    }

    .form-group input::placeholder {
      color: var(--muted);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .login-btn:hover {
      opacity: 0.9;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .login-footer a {
      color: #c4b5fd;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand brand-center">
        <div class="brand-mark">P</div>
        <div>
          <div class="brand-title">Polymarket AI</div>
          <div class="brand-subtitle">Agent Console</div>
        </div>
      </div>

      <h2>Welcome back</h2>
      <p class="sub">Sign in to your dashboard</p>

      <form action="/dashboard" method="post">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="login-btn">Sign In</button>
      </form>

      <div class="login-footer">
        Don't have an account? <a href="#">Sign up</a>
      </div>
    </div>
  </div>
</body>
</html>
